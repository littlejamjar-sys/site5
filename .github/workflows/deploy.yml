name: Deploy site5

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Pi
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Deploy to live directory
        run: |
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.github' \
            $GITHUB_WORKSPACE/ /var/www/site5/
