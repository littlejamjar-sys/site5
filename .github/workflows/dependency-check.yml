name: Dependency Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

jobs:
  dependency-check:
    runs-on: ubuntu-latest
    name: Security Audit

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run npm audit
        run: npm audit --audit-level=moderate 2>/dev/null || echo "No package.json found - static site"
        continue-on-error: true

      - name: Scan for known vulnerabilities in HTML/JS
        run: |
          echo "Running static security analysis..."
          # Check for common security issues
          grep -r "eval(" . --include="*.js" --include="*.html" 2>/dev/null && echo "⚠️ Warning: eval() found" || echo "✅ No eval() usage"
          grep -r "innerHTML" . --include="*.js" 2>/dev/null && echo "⚠️ Warning: innerHTML usage found" || echo "✅ Safe DOM manipulation"
          grep -r "onclick=" . --include="*.html" 2>/dev/null && echo "⚠️ Warning: Inline onclick handlers found" || echo "✅ No inline handlers"

      - name: Generate security report
        run: |
          echo "# Security Check Report" > security-report.md
          echo "- Static HTML/JavaScript site" >> security-report.md
          echo "- No npm dependencies to audit" >> security-report.md
          echo "- Timestamp: $(date)" >> security-report.md

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: security-report.md
